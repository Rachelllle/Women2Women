<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Women2Women — Cycle companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:#F6EFEC; --sand:#EAD9D6; --surface:#FFFFFF;
    --primary:#7D3C58; --primary-deep:#5E2841;
    --blush:#E8C2C8; --petal:#D49AA8; --ochre:#C99064; --sage:#7E927B;
    --ink:#2A1620; --mute:#6E4A57;
    --c-menstrual:#7D3C58; --c-follicular:#E8C2C8; --c-ovulation:#D9A47F; --c-luteal:#A86F84;
    --font-display:"Instrument Serif", Georgia, serif;
    --font-sans:"Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --border: color-mix(in oklab, var(--ink) 10%, transparent);
    --border-soft: color-mix(in oklab, var(--ink) 6%, transparent);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
  em { font-style: italic; }
  button, input, textarea { font-family: inherit; color: inherit; }
  button { cursor: pointer; }
  a { color: inherit; text-decoration: none; }

  /* ──────────────────────────────────────────────────────────────
     APP SHELL — sidebar + main
     ────────────────────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 248px 1fr;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 90% 5%, color-mix(in oklab, var(--petal) 28%, transparent), transparent 50%),
      radial-gradient(ellipse at 5% 95%, color-mix(in oklab, var(--blush) 30%, transparent), transparent 55%),
      var(--cream);
  }
  .app.onboarding-mode { grid-template-columns: 1fr; }

  /* SIDEBAR */
  .sidebar {
    padding: 28px 18px 24px;
    border-right: 1px solid var(--border-soft);
    background: color-mix(in oklab, var(--cream) 70%, white);
    display: flex; flex-direction: column; gap: 8px;
    position: sticky; top: 0; height: 100vh;
  }
  .sb-brand { display: flex; align-items: baseline; gap: 8px; padding: 4px 10px 22px; }
  .sb-brand-mark { font-family: var(--font-display); font-size: 32px; line-height: 1; color: var(--ink); }
  .sb-brand-mark em { color: var(--primary); }
  .sb-brand-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mute); padding-bottom: 4px; }
  .sb-section { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mute); padding: 18px 14px 6px; font-weight: 500; }
  .sb-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 12px;
    font-size: 14px; color: var(--ink);
    border: 1px solid transparent;
    background: transparent;
    width: 100%; text-align: left;
    appearance: none; cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .sb-item:hover { background: color-mix(in oklab, var(--surface) 60%, transparent); }
  .sb-item.on { background: var(--surface); border-color: var(--border); box-shadow: 0 1px 0 rgba(46,27,29,0.04); font-weight: 500; }
  .sb-item svg { color: var(--mute); flex-shrink: 0; }
  .sb-item.on svg { color: var(--primary); }
  .sb-item .sb-badge { margin-left: auto; background: var(--primary); color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 500; letter-spacing: 0; }

  .sb-phase-card {
    margin-top: auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .sb-phase-mini { display: grid; place-items: center; }
  .sb-phase-meta { flex: 1; min-width: 0; }
  .sb-phase-meta .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); }
  .sb-phase-meta .display { font-size: 16px; line-height: 1.1; margin-top: 2px; }
  .sb-phase-meta .muted-small { color: var(--mute); font-size: 11px; }

  /* MAIN */
  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 40px 0;
    gap: 16px;
  }
  .topbar-meta { display: flex; align-items: center; gap: 12px; }
  .phase-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 999px;
    font-size: 13px;
  }
  .phase-pill-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
  .phase-pill em { color: var(--mute); font-style: normal; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    position: relative; appearance: none; cursor: pointer;
  }
  .icon-btn-solid {
    width: 40px; height: 40px; border-radius: 999px; border: 0;
    background: var(--ink); color: var(--cream);
    display: inline-flex; align-items: center; justify-content: center; appearance: none; cursor: pointer;
  }
  .icon-btn-sm {
    width: 32px; height: 32px; border-radius: 999px;
    border: 1px solid var(--border); background: transparent; color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; appearance: none; cursor: pointer;
  }

  /* COMMON */
  .content { padding: 24px 40px 60px; flex: 1; min-width: 0; }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); font-weight: 500; }
  .muted-small { font-size: 12px; color: var(--mute); }
  .screen-title { font-size: 44px; line-height: 1.02; margin: 4px 0 0; color: var(--ink); }
  .screen-hd { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
  .lede { font-size: 17px; line-height: 1.5; color: var(--mute); margin: 0; max-width: 60ch; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }

  .btn-primary {
    appearance: none; border: 0;
    background: var(--ink); color: var(--cream);
    padding: 14px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    cursor: pointer;
  }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }
  .btn-primary.btn-sm { padding: 10px 18px; font-size: 13px; }
  .btn-primary.btn-block { width: 100%; }
  .btn-ghost { appearance: none; border: 0; background: transparent; color: var(--mute); font-size: 13px; padding: 10px; text-decoration: underline; text-underline-offset: 4px; cursor: pointer; }
  .btn-outline {
    appearance: none; background: transparent;
    border: 1px solid var(--border); color: var(--ink);
    padding: 10px 18px; border-radius: 999px; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  }

  /* TODAY (HOME) */
  .home-grid {
    display: grid; grid-template-columns: minmax(0,1.15fr) minmax(0,1fr);
    gap: 24px;
  }
  .hero-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 28px; padding: 32px;
    display: grid; grid-template-columns: 340px 1fr; gap: 28px; align-items: center;
  }
  .hero-text .greet { font-family: var(--font-display); font-size: 42px; line-height: 1.05; margin: 8px 0 14px; }
  .hero-phase-blurb { font-size: 20px; line-height: 1.35; color: var(--ink); margin: 0 0 18px; font-family: var(--font-display); }
  .hero-quick { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .chip {
    appearance: none; border: 1px solid var(--border);
    background: transparent; padding: 8px 14px; border-radius: 999px;
    font-size: 13px; color: var(--ink); cursor: pointer;
  }
  .chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .stack-row { display: flex; flex-direction: column; gap: 16px; }
  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px 22px;
  }
  .info-card.next-period {
    background: linear-gradient(135deg, color-mix(in oklab, var(--c-menstrual) 18%, var(--surface)), var(--surface) 70%);
  }
  .info-val { font-family: var(--font-display); font-size: 28px; line-height: 1.05; margin: 6px 0 4px; }
  .info-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }

  .phase-mini-strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    margin-top: 14px; border-radius: 12px; overflow: hidden;
  }
  .phase-mini-strip span {
    height: 8px; border-radius: 4px; opacity: 0.45;
  }
  .phase-mini-strip span.on { opacity: 1; }

  .recs-strip { margin-top: 28px; }
  .recs-strip-hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .recs-strip-hd h2 { font-family: var(--font-display); font-size: 28px; margin: 0; }
  .tip-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

  .tip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 18px 20px;
  }
  .tip-icon {
    width: 36px; height: 36px; border-radius: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    background: color-mix(in oklab, var(--cream) 60%, transparent);
    color: var(--ink); margin-bottom: 12px;
  }
  .tip-food .tip-icon { background: color-mix(in oklab, var(--sage) 22%, transparent); color: color-mix(in oklab, var(--sage) 90%, var(--ink)); }
  .tip-move .tip-icon { background: color-mix(in oklab, var(--ochre) 25%, transparent); color: color-mix(in oklab, var(--ochre) 80%, var(--ink)); }
  .tip-mood .tip-icon, .tip-mind .tip-icon { background: color-mix(in oklab, var(--primary) 18%, transparent); color: var(--primary-deep); }
  .tip-care .tip-icon { background: color-mix(in oklab, var(--petal) 35%, transparent); color: var(--primary-deep); }
  .tip-tag { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); font-weight: 500; }
  .tip-title { font-family: var(--font-display); font-size: 22px; line-height: 1.12; margin: 4px 0 8px; }
  .tip-body { font-size: 13.5px; line-height: 1.5; color: var(--mute); margin: 0; }

  /* CALENDAR */
  .cal-grid-2 { display: grid; grid-template-columns: minmax(0,1.4fr) minmax(0,1fr); gap: 24px; }
  .cal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 24px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .cal-month { font-family: var(--font-display); font-size: 28px; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; color: var(--mute); margin-bottom: 8px; letter-spacing: 0.06em; }
  .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .cal-cell { aspect-ratio: 1; display: grid; place-items: center; font-size: 14px; color: var(--ink); border-radius: 12px; }
  .cal-cell.empty { visibility: hidden; }
  .cal-cell.is-period { background: var(--c-menstrual); color: #fff; }
  .cal-cell.is-predicted { background: transparent; border: 1.5px dashed var(--c-menstrual); color: var(--c-menstrual); }
  .cal-cell.is-fertile { background: color-mix(in oklab, var(--c-ovulation) 30%, transparent); }
  .cal-cell.is-ov { background: var(--c-ovulation); color: var(--ink); font-weight: 600; }
  .cal-cell.is-today { box-shadow: inset 0 0 0 2px var(--ink); font-weight: 600; }
  .cal-cell.is-today.is-period { box-shadow: inset 0 0 0 2px #fff; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px; color: var(--mute); margin-top: 18px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .lg-dot { width: 10px; height: 10px; border-radius: 50%; }
  .lg-period { background: var(--c-menstrual); }
  .lg-predicted { background: transparent; border: 1.5px dashed var(--c-menstrual); }
  .lg-fertile { background: color-mix(in oklab, var(--c-ovulation) 50%, transparent); }
  .lg-ov { background: var(--c-ovulation); }

  .cal-side { display: flex; flex-direction: column; gap: 16px; }
  .cycle-mini-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 24px; display: flex; gap: 18px; align-items: center; }
  .cycle-mini-text .cycle-mini-val { font-family: var(--font-display); font-size: 32px; line-height: 1; }
  .upcoming-card { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 20px 22px; }
  .upcoming-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-top: 1px solid var(--border-soft); }
  .upcoming-row:first-of-type { border-top: 0; }
  .upcoming-pill { width: 50px; text-align: center; flex-shrink: 0; }
  .upcoming-pill .day { font-family: var(--font-display); font-size: 24px; line-height: 1; }
  .upcoming-pill .mo { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin-top: 2px; }
  .upcoming-body { flex: 1; }
  .upcoming-body h4 { font-size: 14px; font-weight: 500; margin: 0; }
  .upcoming-body p { font-size: 12.5px; color: var(--mute); margin: 2px 0 0; }
  .upcoming-tag { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); padding: 4px 10px; border-radius: 999px; background: color-mix(in oklab, var(--cream) 70%, transparent); }
  .upcoming-tag.t-period { background: color-mix(in oklab, var(--c-menstrual) 18%, transparent); color: var(--primary-deep); }
  .upcoming-tag.t-fertile { background: color-mix(in oklab, var(--c-ovulation) 25%, transparent); }

  /* INSIGHTS */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-chip {
    appearance: none; border: 1px solid var(--border);
    background: transparent; color: var(--ink);
    padding: 10px 18px; border-radius: 999px; font-size: 13px; cursor: pointer;
  }
  .filter-chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .tip-grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .insight-banner {
    margin-top: 28px;
    background: var(--ink); color: var(--cream);
    border-radius: 22px; padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .insight-banner .eyebrow { color: color-mix(in oklab, var(--cream) 60%, transparent); }
  .insight-banner-text { font-family: var(--font-display); font-size: 28px; margin: 4px 0 0; }
  .insight-banner .btn-primary { background: var(--cream); color: var(--ink); }

  /* CHAT */
  .chat-wrap { max-width: 820px; margin: 0 auto; }
  .chat-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .chat-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--primary); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-size: 24px; }
  .chat-header h1 { font-family: var(--font-display); font-size: 32px; margin: 0; }
  .chat-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mute); }
  .chat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); }
  .chat-thread { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; max-height: 60vh; overflow-y: auto; }
  .bubble { display: flex; gap: 10px; align-items: flex-end; max-width: 80%; }
  .bubble-me { align-self: flex-end; flex-direction: row-reverse; }
  .bubble-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .bubble-text { padding: 14px 18px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; background: var(--surface); border: 1px solid var(--border); color: var(--ink); }
  .bubble-bot .bubble-text { border-bottom-left-radius: 6px; }
  .bubble-me .bubble-text { background: var(--ink); color: var(--cream); border-color: var(--ink); border-bottom-right-radius: 6px; }
  .typing { display: inline-flex; gap: 4px; padding: 16px 18px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--mute); animation: typing 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
  .chat-prompts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .chat-prompts .chip { background: var(--surface); }
  .chat-input {
    display: flex; gap: 10px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    padding: 8px 8px 8px 18px; border-radius: 999px;
    box-shadow: 0 8px 24px -16px rgba(46,27,29,0.2);
  }
  .chat-input input { flex: 1; border: 0; background: transparent; padding: 10px 0; font-size: 14px; outline: none; }

  /* ALERTS */
  .alerts-wrap { max-width: 820px; }
  .alert-row {
    display: flex; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px;
    margin-bottom: 10px;
    position: relative;
    cursor: pointer;
  }
  .alert-row.unread { background: linear-gradient(to right, color-mix(in oklab, var(--blush) 30%, var(--surface)), var(--surface) 50%); }
  .alert-icon {
    width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
    display: grid; place-items: center;
    background: color-mix(in oklab, var(--cream) 70%, transparent); color: var(--ink);
  }
  .alert-period .alert-icon { background: color-mix(in oklab, var(--c-menstrual) 18%, transparent); color: var(--primary-deep); }
  .alert-phase .alert-icon { background: color-mix(in oklab, var(--c-luteal) 25%, transparent); color: var(--primary-deep); }
  .alert-tip .alert-icon { background: color-mix(in oklab, var(--ochre) 25%, transparent); color: color-mix(in oklab, var(--ochre) 90%, var(--ink)); }
  .alert-body { flex: 1; min-width: 0; }
  .alert-meta { display: flex; gap: 10px; align-items: center; font-size: 11px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .alert-urgent { color: var(--primary); }
  .alert-title { font-size: 15px; font-weight: 500; margin: 4px 0 4px; }
  .alert-text { font-size: 13px; line-height: 1.5; color: var(--mute); margin: 0; }
  .alert-x { appearance: none; border: 0; background: transparent; color: var(--mute); font-size: 20px; padding: 4px 8px; cursor: pointer; }
  .alert-settings { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px 22px; margin-top: 24px; }
  .alert-settings-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 14px; border-top: 1px solid var(--border-soft); }
  .alert-settings-row:first-of-type { border-top: 0; }

  /* PROFILE */
  .prof-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
  .prof-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px; text-align: center;
  }
  .prof-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-size: 40px; margin: 0 auto 14px; }
  .prof-name { font-family: var(--font-display); font-size: 28px; margin: 0; }
  .prof-sub { font-size: 13px; color: var(--mute); margin-top: 4px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 22px; }
  .stat { background: var(--sand); border-radius: 14px; padding: 14px 8px; text-align: center; }
  .stat-val { font-family: var(--font-display); font-size: 26px; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--mute); margin-top: 4px; letter-spacing: 0.06em; }
  .prof-section { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 6px 22px; margin-bottom: 14px; }
  .prof-section-hd { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); margin: 16px 0 4px; font-weight: 500; }
  .prof-row { display: flex; justify-content: space-between; padding: 14px 0; font-size: 14px; border-top: 1px solid var(--border-soft); }
  .prof-row:first-of-type { border-top: 0; }
  .prof-row .arrow-r { color: var(--mute); }
  .prof-privacy { display: flex; gap: 14px; padding: 18px 22px; background: color-mix(in oklab, var(--sage) 16%, var(--cream)); border-radius: 18px; align-items: flex-start; margin-bottom: 14px; }
  .prof-privacy svg { color: var(--sage); flex-shrink: 0; margin-top: 2px; }

  /* ONBOARDING */
  .onboarding {
    min-height: 100vh; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .ob-decor-panel {
    background:

<body>

  <script type="text/babel" data-presets="react">
  /* ════════════════════════════════════════════════════════════════════════════
     WOMEN2WOMEN — Cycle companion
     Single-file React app (no build step).

     │   1. api.veraReply(message, ctx)        →  POST /api/chat                │
     │   2. api.fetchRecommendations(ctx)      →  GET  /api/recommendations     │
     │   3. api.predictNextPeriod(ctx)         →  GET  /api/predict             │
     │   4. api.fetchAlerts(ctx)               →  GET  /api/alerts              │
     │                                                                          │
     │ Each currently returns a local stub so the UI is fully working out of   │
     │ the box. Replace the body with `fetch(...)` once your Flask/FastAPI     │
     │ server is up. See the bottom of the file for a Flask skeleton.          │
     └──────────────────────────────────────────────────────────────────────────┘
     ════════════════════════════════════════════════════════════════════════════ */

  const { useState, useEffect, useRef } = React;

  /* ═══════════════════════ CYCLE MATH ═══════════════════════ */
  const CYCLE_LENGTH = 28;
  const PHASES = [
    { id: "menstrual",  name: "Menstrual",  start: 1,  end: 5,  blurb: "Rest. Replenish. Honour the slow.",   color: "var(--c-menstrual)"  },
    { id: "follicular", name: "Follicular", start: 6,  end: 13, blurb: "Energy rising. Build, plan, begin.",   color: "var(--c-follicular)" },
    { id: "ovulation",  name: "Ovulation",  start: 14, end: 16, blurb: "Peak. Connect, create, shine.",        color: "var(--c-ovulation)"  },
    { id: "luteal",     name: "Luteal",     start: 17, end: 28, blurb: "Slow turn inward. Finish & tidy.",     color: "var(--c-luteal)"     },
  ];
  const phaseForDay = (day) => PHASES.find(p => day >= p.start && day <= p.end) || PHASES[0];
  const daysUntilNextPeriod = (day, cycle = CYCLE_LENGTH) => ((cycle - day) % cycle) + 1;
  const fmtDate = (d) => d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
  const cycleDayFromDates = (lastStart, today, cycle = CYCLE_LENGTH) => {
    const days = Math.floor((today - lastStart) / 86400000);
    return ((days % cycle) + cycle) % cycle + 1;
  };

  /* ═══════════════════════ API LAYER — wire these to Python ═══════════════════════
     Each function returns a Promise. The stubs below let the app work fully offline.
     Replace each body with `return fetch(...).then(r => r.json())` to go live.
  */
  const API_BASE = "http://localhost:5000";

  const api = {
    // ─── AI hook #1 — chatbot reply ────────────────────────────────────────────
    // ctx = { day, phase, profile, history }
    async veraReply(message, ctx) {
      // TODO (Python): replace with:
      // return fetch(`${API_BASE}/api/chat`, {
      //   method: "POST", headers: { "Content-Type": "application/json" },
      //   body: JSON.stringify({ message, ctx })
      // }).then(r => r.json()).then(j => j.reply);
      await new Promise(r => setTimeout(r, 900 + Math.random() * 500));
      const scripted = {
        "Why am I so tired today?": `On day ${ctx.day} you're in your ${ctx.phase} phase — energy naturally dips as progesterone climbs. Try: protein at every meal, an earlier bedtime tonight, and swap one HIIT session for a walk this week. If it persists past your period, it's worth checking iron levels.`,
        "What should I eat?": `Lean into iron and magnesium today — lentils, leafy greens, dark chocolate, pumpkin seeds. Pair iron-rich foods with citrus or peppers for better absorption. Warm, cooked foods feel kinder to your gut in the ${ctx.phase} phase than cold salads.`,
        "Is this cramping normal?": "Mild to moderate cramps in the first 1–3 days of your period are typical — caused by prostaglandins. A heat pack, magnesium, and gentle movement usually help. If pain stops you functioning, soaks through protection in under 2 hours, or comes with fever, please see a clinician.",
        "I feel low — what helps?": "It's real, and it's chemical — estrogen drops sharply before your period and serotonin dips with it. Three small things that genuinely help: 15 minutes outdoors, a 10-minute walk, and texting one person you trust. We can sit with it together for a while if you'd like.",
        "Should I work out today?": `On day ${ctx.day} (${ctx.phase} phase), match the intensity to your energy. Build days (follicular, ovulation) are great for strength and HIIT. Slow days (menstrual, late luteal) lean toward walking, pilates, mobility. Honour what your body's offering today.`,
      };
      return scripted[message] || `Thanks for sharing that. Given you're on day ${ctx.day} (${ctx.phase} phase), it's worth being gentle with yourself. Tell me more — is it physical, emotional, or both?`;
    },

    // ─── AI hook #2 — phase-aware recommendations ──────────────────────────────
    async fetchRecommendations(ctx) {
      try {
        const feeling   = ctx.feeling || "";
        const cycleLen  = ctx.profile?.cycleLen  || 28;
        const periodLen = ctx.profile?.periodLen || 5;
        const data = await fetch(
          `${API_BASE}/api/recommendations?day=${ctx.day}&phase=${ctx.phase}&feeling=${encodeURIComponent(feeling)}&cycleLen=${cycleLen}&periodLen=${periodLen}`,
          { credentials: 'include' }
        ).then(r => r.json());
        return Array.isArray(data) ? data : TIPS_BY_PHASE[ctx.phase] || [];
      } catch {
        return TIPS_BY_PHASE[ctx.phase] || [];
      }
    },

    // ─── AI hook #3 — next-period prediction ───────────────────────────────────
    async predictNextPeriod(ctx) {
      // TODO (Python): replace with an ML-based prediction call:
      // return fetch(`${API_BASE}/api/predict`, {
      //   method: "POST", headers: { "Content-Type": "application/json" },
      //   body: JSON.stringify({ profile: ctx.profile, history: ctx.history })
      // }).then(r => r.json());
      const daysToNext = daysUntilNextPeriod(ctx.day, ctx.profile.cycleLen);
      return {
        date: addDays(new Date(), daysToNext - 1).toISOString().slice(0, 10),
        daysToNext,
        confidence: 0.82
      };
    },

    // ─── AI hook #4 — personalized alerts ──────────────────────────────────────
    async fetchAlerts(ctx) {
      // TODO (Python): replace with:
      // return fetch(`${API_BASE}/api/alerts`).then(r => r.json());
      const today = new Date();
      const nextPeriod = addDays(today, daysUntilNextPeriod(ctx.day, ctx.profile.cycleLen) - 1);
      return [
        { id: 1, kind: "period",   urgent: true,  when: "in 2 days",  title: "Your period is expected soon", body: `Pack the essentials. We've predicted ${fmtDate(nextPeriod)} as day 1 of your next cycle.`, unread: true },
        { id: 2, kind: "phase",    urgent: false, when: "today",      title: "You're entering your luteal phase", body: "Energy may dip toward the end of this week. We'll adjust your recommendations.", unread: true },
{ id: 4, kind: "tip",      urgent: false, when: "2 days ago", title: "Sleep dropped 12% this week", body: "Common before your period. Try winding down 30 minutes earlier tonight.", unread: false },
        { id: 5, kind: "phase",    urgent: false, when: "5 days ago", title: "Cycle ran 3 days longer than your average", body: "Stress, travel, illness, and big training loads can all extend a cycle. Worth noting.", unread: false },
      ];
    },
  };

  /* ═══════════════════════ TIP COPY (stub recommendations) ═══════════════════════ */
  const TIPS_BY_PHASE = {
    menstrual: [
      { kind: "food", icon: "leaf",    title: "Iron-rich plates",      body: "Lentils, dark greens, beets. Pair with vitamin C to absorb more.", tag: "Nourish" },
      { kind: "move", icon: "heart",   title: "Slow movement",         body: "Gentle yin yoga or a long walk. Skip the HIIT today.", tag: "Move" },
      { kind: "mood", icon: "moon",    title: "Permission to rest",    body: "Your body is doing real work. Lights low, hot water bottle, kind self-talk.", tag: "Mind" },
      { kind: "care", icon: "drop",    title: "Cramp comfort",         body: "Magnesium-rich snacks (dark chocolate, pumpkin seeds) can take the edge off.", tag: "Care" },
    ],
    follicular: [
      { kind: "move", icon: "sparkle", title: "Build the strength",    body: "Energy is climbing — a great week to add resistance work or try a new class.", tag: "Move" },
      { kind: "food", icon: "leaf",    title: "Fresh and bright",      body: "Light proteins, fermented foods, citrus. Your gut is more receptive now.", tag: "Nourish" },
      { kind: "mood", icon: "sparkle", title: "Start the thing",       body: "Better focus and risk tolerance — pitch the idea, send the message.", tag: "Mind" },
      { kind: "care", icon: "heart",   title: "Skin loves you back",   body: "Estrogen rising means clearer skin. Light moisturizer, SPF, leave it alone.", tag: "Care" },
    ],
    ovulation: [
      { kind: "mood", icon: "sparkle", title: "Speak up",              body: "Verbal fluency peaks. Schedule the talk, the date, the interview.", tag: "Mind" },
      { kind: "food", icon: "leaf",    title: "Antioxidants",          body: "Berries, cruciferous veg, plenty of water — support egg health and hydration.", tag: "Nourish" },
      { kind: "care", icon: "heart",   title: "Notice the signs",      body: "Egg-white cervical mucus, tender breasts, light twinges. All normal markers.", tag: "Care" },
      { kind: "move", icon: "heart",   title: "Train hard, recover well", body: "Strength gains are highest now. Lift heavy, then prioritize sleep.", tag: "Move" },
    ],
    luteal: [
      { kind: "food", icon: "leaf",    title: "Steady your blood sugar", body: "Complex carbs plus protein every few hours keeps the mood swings smaller.", tag: "Nourish" },
      { kind: "mood", icon: "moon",    title: "Edit, don't begin",     body: "Better at finishing than starting now. Use it — close open loops.", tag: "Mind" },
      { kind: "move", icon: "heart",   title: "Walks > sprints",       body: "Pilates, walking, mobility work. Heavy cardio can spike cortisol.", tag: "Move" },
      { kind: "care", icon: "drop",    title: "Hydrate generously",    body: "Bloating eases with more water and less salt, not the other way round.", tag: "Care" },
    ],
  };

  /* ═══════════════════════ ICONS ═══════════════════════ */
  const Icon = ({ name, size = 18, stroke = 1.6 }) => {
    const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round" };
    switch (name) {

      case "calendar": return (<svg {...props}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
      case "sparkle":  return (<svg {...props}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M6 18l2.5-2.5M15.5 8.5 18 6"/><circle cx="12" cy="12" r="2.5"/></svg>);

      case "plus":     return (<svg {...props}><path d="M12 5v14M5 12h14"/></svg>);
      case "back":     return (<svg {...props}><path d="M15 18 9 12l6-6"/></svg>);
      case "forward":  return (<svg {...props}><path d="M9 18l6-6-6-6"/></svg>);
      case "arrow":    return (<svg {...props}><path d="M5 12h14M13 6l6 6-6 6"/></svg>);

  };

  /* ═══════════════════════ CYCLE DIAL (SVG) ═══════════════════════ */
  function CycleDial({ day = 14, size = 300, cycle = CYCLE_LENGTH }) {
    const R_OUTER = size / 2 - 6;
    const R_INNER = R_OUTER - 22;
    const cx = size / 2, cy = size / 2;
    const angleFor = (d) => (d - 1) / cycle * 360 - 90;
    const polar = (a, r) => [cx + r * Math.cos(a * Math.PI / 180), cy + r * Math.sin(a * Math.PI / 180)];
    function arcPath(startDay, endDay) {
      const a0 = angleFor(startDay - 1);
      const a1 = angleFor(endDay);
      const large = (a1 - a0) > 180 ? 1 : 0;
      const [x0, y0] = polar(a0, R_OUTER);
      const [x1, y1] = polar(a1, R_OUTER);
      const [x2, y2] = polar(a1, R_INNER);
      const [x3, y3] = polar(a0, R_INNER);
      return `M ${x0} ${y0} A ${R_OUTER} ${R_OUTER} 0 ${large} 1 ${x1} ${y1} L ${x2} ${y2} A ${R_INNER} ${R_INNER} 0 ${large} 0 ${x3} ${y3} Z`;
    }
    const phase = phaseForDay(day);
    const daysToNext = daysUntilNextPeriod(day, cycle);
    const todayA = angleFor(day - 0.5);
    const [tx, ty] = polar(todayA, (R_OUTER + R_INNER) / 2);
    const dots = [];
    for (let d = 1; d <= cycle; d++) {
      const a = angleFor(d - 0.5);
      const [dx, dy] = polar(a, R_INNER - 12);
      dots.push(<circle key={d} cx={dx} cy={dy} r={d === day ? 2.5 : 1} fill={d === day ? "var(--ink)" : "rgba(46,27,29,0.22)"} />);
    }
    return (
      <div className="dial-wrap" style={{ width: size, height: size, position: "relative" }}>
        <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ overflow: "visible" }}>
          {PHASES.map(p => (
            <path key={p.id} d={arcPath(p.start, p.end)} fill={p.color} opacity={p.id === phase.id ? 1 : 0.55} />
          ))}
          {PHASES.map(p => {
            const a = angleFor(p.start - 1);
            const [x1, y1] = polar(a, R_INNER);
            const [x2, y2] = polar(a, R_OUTER);
            return <line key={p.id+"sep"} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--cream)" strokeWidth="2" />;
          })}
          {dots}
          <g transform={`translate(${tx} ${ty})`}>
            <circle r="9" fill="var(--ink)" />
            <circle r="3.5" fill="var(--cream)" />
          </g>
        </svg>
        <div style={{
          position: "absolute", inset: 0, display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", pointerEvents: "none",
          textAlign: "center", padding: "0 18%",
        }}>
          {size >= 200 && (
            <div style={{ fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--mute)", fontWeight: 500 }}>
              Day {day} · {phase.name}
            </div>
          )}
          <div className="display" style={{ fontSize: size >= 200 ? size * 0.18 : size * 0.13, lineHeight: 1, marginTop: size >= 200 ? 6 : 0, color: "var(--ink)" }}>
            {daysToNext}
            <span style={{ fontSize: size >= 200 ? size * 0.06 : size * 0.05, marginLeft: 3, fontStyle: "italic", color: "var(--mute)" }}>days</span>
          </div>
          <div style={{ fontSize: size >= 200 ? 12 : 6, color: "var(--mute)", marginTop: 2 }}>until next period</div>
        </div>
      </div>
    );
  }

  function MiniRing({ day = 14, size = 44, cycle = CYCLE_LENGTH }) {
    const r = size / 2 - 3;
    const c = size / 2;
    const phase = phaseForDay(day);
    const dash = 2 * Math.PI * r;
    const filled = (day / cycle) * dash;
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={c} cy={c} r={r} fill="none" stroke="rgba(46,27,29,0.08)" strokeWidth="3" />
        <circle cx={c} cy={c} r={r} fill="none" stroke={phase.color}
          strokeWidth="3" strokeLinecap="round"
          strokeDasharray={`${filled} ${dash - filled}`}
          transform={`rotate(-90 ${c} ${c})`} />
        <text x={c} y={c + 4} textAnchor="middle" fontSize={size * 0.32} fontWeight="600" fill="var(--ink)">{day}</text>
      </svg>
    );
  }

  /* ═══════════════════════ ONBOARDING ═══════════════════════ */
  function Onboarding({ onDone }) {
    const [mode, setMode]           = useState("welcome"); // "welcome" | "login" | "register"
    const [step, setStep]           = useState(0);         // register steps 0-3
    const [email, setEmail]         = useState("");
    const [password, setPassword]   = useState("");
    const [authError, setAuthError] = useState("");
    const [authLoading, setAuthLoading] = useState(false);
    const [name, setName]           = useState("");
    const [phoneNumber, setPhoneNumber] = useState("");
    const [lastPeriod, setLastPeriod] = useState("");
    const [cycleLen, setCycleLen]   = useState(28);
    const [periodLen, setPeriodLen] = useState(5);

    // ── Login (existing account) ──────────────────────────────
    const handleLogin = async () => {
      if (!email.includes("@")) { setAuthError("Please enter a valid email address."); return; }
      if (!password)             { setAuthError("Please enter your password."); return; }
      setAuthLoading(true); setAuthError("");
      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        if (res.status === 401) { setAuthError("Wrong email or password. Try again."); setAuthLoading(false); return; }
        if (!res.ok)            { setAuthError("Something went wrong. Please try again."); setAuthLoading(false); return; }
        // fetch saved profile
        const me = await fetch(`${API_BASE}/api/auth/me`, { credentials: "include" }).then(r => r.json());
        if (me.lastPeriod) {
          onDone({ name: me.name, lastPeriod: me.lastPeriod, cycleLen: me.cycleLen, periodLen: me.periodLen });
        } else {
          setMode("register"); setStep(0); // profile incomplete → continue onboarding
        }
      } catch { setAuthError("Cannot reach the server. Make sure the backend is running."); }
      setAuthLoading(false);
    };

    // ── Register step 0: create account ──────────────────────
    const handleRegister = async () => {
      if (!email.includes("@"))  { setAuthError("Please enter a valid email address."); return; }
      if (password.length < 6)   { setAuthError("Password must be at least 6 characters."); return; }
      setAuthLoading(true); setAuthError("");
      try {
        const reg = await fetch(`${API_BASE}/api/auth/register`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        if (reg.status === 409) { setAuthError("This email is already registered. Log in instead."); setAuthLoading(false); return; }
        if (!reg.ok)            { const j = await reg.json(); setAuthError(j.error || "Registration failed."); setAuthLoading(false); return; }
        await fetch(`${API_BASE}/api/auth/login`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        setStep(1); // move to name step
      } catch { setAuthError("Cannot reach the server. Make sure the backend is running."); }
      setAuthLoading(false);
    };

    const canRegisterAdvance = () => {
      if (step === 0) return email.includes("@") && password.length >= 6;
      if (step === 1) return name.trim().length > 0;
      if (step === 2) return !!lastPeriod;
      return true;
    };
    const registerNext = () => {
      if (step === 0) { handleRegister(); return; }
      if (step < 3) setStep(step + 1);
      else onDone({ name: name.trim() || "friend", lastPeriod, cycleLen, periodLen, phoneNumber });
    };

    const registerSteps = ["account","name","last period","cycle"];
    const switchMode = (m) => { setMode(m); setAuthError(""); setEmail(""); setPassword(""); };

    return (
      <div className="onboarding">
        <div className="ob-decor-panel">
          <div className="ob-wheel">
            <div className="ob-wheel-ring" />
            <div className="ob-wheel-text">w<em>2</em>w</div>
          </div>
          <div className="ob-quote">A quiet companion for your cycle — predictions, gentle alerts, and a kind ear when you need one.</div>
        </div>

        <div className="ob-form-panel">
          <div className="ob-form-hd">
            <div className="ob-brand">
              <div className="ob-brand-mark">w<em>2</em>w</div>
              <div className="ob-brand-sub">Women2Women</div>
            </div>
            {mode === "register" && (
              <div className="ob-dots">
                {registerSteps.map((_, i) => <span key={i} className={`ob-dot ${i <= step ? "on" : ""}`} />)}
              </div>
            )}
          </div>

          <div className="ob-body">

            {/* ── Welcome ── */}
            {mode === "welcome" && (<>
              <h1 className="ob-title">Women, <em>knowing</em> women.</h1>
              <p className="ob-sub">Track your cycle. Get personalised recommendations, predict your next period, and talk to a companion who understands your body.</p>
              <div className="ob-actions">
                <button className="btn-primary" onClick={() => switchMode("register")}>Create my profile <Icon name="arrow" size={16} /></button>
                <button className="btn-ghost" onClick={() => switchMode("login")}>Log in to existing account</button>
              </div>
            </>)}

            {/* ── Log in ── */}
            {mode === "login" && (<>
              <h1 className="ob-title">Welcome <em>back</em>.</h1>
              <p className="ob-sub">Sign in to pick up where you left off.</p>
              <input className="ob-input" type="email" placeholder="Email address" value={email}
                onChange={e => { setEmail(e.target.value); setAuthError(""); }} autoFocus
                onKeyDown={e => e.key === "Enter" && handleLogin()} />
              <input className="ob-input" type="password" placeholder="Password" value={password}
                onChange={e => { setPassword(e.target.value); setAuthError(""); }} style={{ marginTop: 10 }}
                onKeyDown={e => e.key === "Enter" && handleLogin()} />
              {authError && <p style={{ color: "var(--berry)", fontSize: 13, marginTop: 8 }}>{authError}</p>}
              <div className="ob-actions">
                <button className="ob-back" onClick={() => switchMode("welcome")}>← Back</button>
                <button className="btn-primary" disabled={authLoading} onClick={handleLogin}>
                  {authLoading ? "Signing in…" : <>Sign in <Icon name="arrow" size={16} /></>}
                </button>
              </div>
              <p style={{ fontSize: 12, color: "#999", marginTop: 16 }}>
                No account yet? <button className="btn-ghost" style={{ fontSize: 12, padding: "2px 6px" }} onClick={() => switchMode("register")}>Create one</button>
              </p>
            </>)}

            {/* ── Register step 0: account ── */}
            {mode === "register" && step === 0 && (<>
              <h1 className="ob-title">Create your <em>account</em>.</h1>
              <p className="ob-sub">Your data stays yours. We use this to save and restore your cycle across devices.</p>
              <input className="ob-input" type="email" placeholder="Email address" value={email}
                onChange={e => { setEmail(e.target.value); setAuthError(""); }} autoFocus />
              <input className="ob-input" type="password" placeholder="Password (min 6 characters)" value={password}
                onChange={e => { setPassword(e.target.value); setAuthError(""); }} style={{ marginTop: 10 }} />
              {authError && <p style={{ color: "var(--berry)", fontSize: 13, marginTop: 8 }}>{authError}</p>}
              <div className="ob-actions">
                <button className="ob-back" onClick={() => switchMode("welcome")}>← Back</button>
                <button className="btn-primary" disabled={!canRegisterAdvance() || authLoading} onClick={registerNext}>
                  {authLoading ? "Creating account…" : <>Continue <Icon name="arrow" size={16} /></>}
                </button>
              </div>
              <p style={{ fontSize: 12, color: "#999", marginTop: 16 }}>
                Already have an account? <button className="btn-ghost" style={{ fontSize: 12, padding: "2px 6px" }} onClick={() => switchMode("login")}>Log in</button>
              </p>
            </>)}

            {/* ── Register step 1: name ── */}
            {mode === "register" && step === 1 && (<>
              <h1 className="ob-title">What should we <em>call you</em>?</h1>
              <p className="ob-sub">First name only.</p>
              <input className="ob-input" placeholder="Your name" value={name}
                onChange={e => setName(e.target.value)} autoFocus
                onKeyDown={e => e.key === "Enter" && canRegisterAdvance() && registerNext()} />
              <p className="ob-sub" style={{ marginTop: 20 }}>WhatsApp number, for gentle cycle alerts.</p>
              <input className="ob-input" placeholder="+33612345678" value={phoneNumber}
                onChange={e => setPhoneNumber(e.target.value)}
                onKeyDown={e => e.key === "Enter" && canRegisterAdvance() && registerNext()} />
              <div className="ob-actions">
                <button className="ob-back" onClick={() => setStep(0)}>← Back</button>
                <button className="btn-primary" disabled={!canRegisterAdvance()} onClick={registerNext}>Continue <Icon name="arrow" size={16} /></button>
              </div>
            </>)}

            {/* ── Register step 2: last period ── */}
            {mode === "register" && step === 2 && (<>
              <h1 className="ob-title">When did your <em>last period</em> start?</h1>
              <p className="ob-sub">A rough date is fine — you can refine it later in the log.</p>
              <input type="date" className="ob-input" value={lastPeriod}
                max={new Date().toISOString().slice(0,10)} onChange={e => setLastPeriod(e.target.value)} />
              <div className="ob-actions">
                <button className="ob-back" onClick={() => setStep(1)}>← Back</button>
                <button className="btn-primary" disabled={!canRegisterAdvance()} onClick={registerNext}>Continue <Icon name="arrow" size={16} /></button>
              </div>
            </>)}

            {/* ── Register step 3: cycle length ── */}
            {mode === "register" && step === 3 && (<>
              <h1 className="ob-title">How long is your <em>cycle</em>?</h1>
              <p className="ob-sub">From day 1 of one period to day 1 of the next. Average is 28 days.</p>
              <div className="ob-stepper-grid">
                <div className="ob-stepper">
                  <div className="ob-stepper-lbl">Cycle</div>
                  <div className="ob-stepper-row">
                    <button onClick={() => setCycleLen(Math.max(20, cycleLen - 1))}>−</button>
                    <span className="display">{cycleLen}<small>days</small></span>
                    <button onClick={() => setCycleLen(Math.min(40, cycleLen + 1))}>+</button>
                  </div>
                </div>
                <div className="ob-stepper">
                  <div className="ob-stepper-lbl">Period</div>
                  <div className="ob-stepper-row">
                    <button onClick={() => setPeriodLen(Math.max(2, periodLen - 1))}>−</button>
                    <span className="display">{periodLen}<small>days</small></span>
                    <button onClick={() => setPeriodLen(Math.min(10, periodLen + 1))}>+</button>
                  </div>
                </div>
              </div>
              <div className="ob-actions">
                <button className="ob-back" onClick={() => setStep(2)}>← Back</button>
                <button className="btn-primary" onClick={registerNext}>Begin <Icon name="arrow" size={16} /></button>
              </div>
            </>)}

          </div>
        </div>
      </div>
    );
  }

  /* ═══════════════════════ CALENDAR ═══════════════════════ */
  function CalendarScreen({ profile, day }) {
    const today = new Date();
    const [viewMonth, setViewMonth] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

    const first = new Date(viewMonth); first.setDate(1);
    const startWeekday = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
    const lastStart = addDays(today, -(day - 1));
    const periodStarts = [];
    for (let i = -2; i <= 2; i++) periodStarts.push(addDays(lastStart, i * profile.cycleLen));

    const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    const dayMeta = (date) => {
      const out = { period: false, predicted: false, fertile: false, ovulation: false, today: false };
      if (sameDay(date, today)) out.today = true;
      for (const s of periodStarts) {
        for (let i = 0; i < profile.periodLen; i++) {
          if (sameDay(addDays(s, i), date)) { out.period = true; if (s > today) out.predicted = true; }
        }
        if (sameDay(addDays(s, 13), date)) out.ovulation = true;
        for (let i = 11; i <= 16; i++) if (sameDay(addDays(s, i), date)) out.fertile = true;
      }
      return out;
    };

    const cells = [];
    for (let i = 0; i < startWeekday; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(viewMonth.getFullYear(), viewMonth.getMonth(), d));

    const upcoming = [];
    for (const s of periodStarts) {
      if (s > today) upcoming.push({ date: s, title: "Next period predicted", body: `Day 1 of cycle. ${profile.periodLen}-day average flow.`, kind: "period" });
      const ov = addDays(s, 13);
      if (ov > today) upcoming.push({ date: ov, title: "Ovulation expected", body: "Verbal fluency, peak energy, fertility highest.", kind: "fertile" });
      const lf = addDays(s, 17);
      if (lf > today) upcoming.push({ date: lf, title: "Luteal phase begins", body: "Energy turns inward — expect a quieter week.", kind: "phase" });
    }
    upcoming.sort((a,b) => a.date - b.date);

    return (
      <>
        <div className="screen-hd">
          <div>
            <div className="eyebrow">Your cycle, mapped</div>
            <h1 className="screen-title display">Calendar</h1>
          </div>
          <button className="btn-outline" onClick={() => setViewMonth(new Date(today.getFullYear(), today.getMonth(), 1))}>Today</button>
        </div>

        <div className="cal-grid-2">
          <div className="cal-card">
            <div className="cal-nav">
              <button className="icon-btn-sm" onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1))}><Icon name="back" size={16} /></button>
              <div className="cal-month">{viewMonth.toLocaleDateString("en-GB", { month: "long", year: "numeric" })}</div>
              <button className="icon-btn-sm" onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))}><Icon name="forward" size={16} /></button>
            </div>
            <div className="cal-weekdays">
              {["MON","TUE","WED","THU","FRI","SAT","SUN"].map((d,i) => <span key={i}>{d}</span>)}
            </div>
            <div className="cal-days">
              {cells.map((c, i) => {
                if (!c) return <div key={i} className="cal-cell empty" />;
                const m = dayMeta(c);
                const cls = ["cal-cell"];
                if (m.period && !m.predicted) cls.push("is-period");
                if (m.predicted) cls.push("is-predicted");
                if (m.ovulation) cls.push("is-ov");
                else if (m.fertile) cls.push("is-fertile");
                if (m.today) cls.push("is-today");
                return <div key={i} className={cls.join(" ")}><span>{c.getDate()}</span></div>;
              })}
            </div>
            <div className="legend">
              <span><span className="lg-dot lg-period" /> period</span>
              <span><span className="lg-dot lg-predicted" /> predicted</span>
              <span><span className="lg-dot lg-fertile" /> fertile</span>
              <span><span className="lg-dot lg-ov" /> ovulation</span>
            </div>
          </div>

          <div className="cal-side">
            <div className="cycle-mini-card">
              <CycleDial day={day} size={140} cycle={profile.cycleLen} />
              <div className="cycle-mini-text">
                <div className="eyebrow">You are here</div>
                <div className="cycle-mini-val display">Day {day}</div>
                <div className="muted-small">{phaseForDay(day).name} phase</div>
              </div>
            </div>

            <div className="upcoming-card">
              <div className="prof-section-hd" style={{ margin: "4px 0 8px" }}>Upcoming</div>
              {upcoming.slice(0, 5).map((u, i) => (
                <div key={i} className="upcoming-row">
                  <div className="upcoming-pill">
                    <div className="day">{u.date.getDate()}</div>
                    <div className="mo">{u.date.toLocaleDateString("en-GB", { month: "short" })}</div>
                  </div>
                  <div className="upcoming-body">
                    <span className={`upcoming-tag t-${u.kind}`}>{u.kind === "period" ? "Period" : u.kind === "fertile" ? "Fertile" : "Phase"}</span>
                    <h4 style={{ marginTop: 6 }}>{u.title}</h4>
                    <p>{u.body}</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="cycle-mini-card" style={{ flexDirection: "column", alignItems: "flex-start", gap: 12 }}>
              <div className="prof-section-hd" style={{ margin: 0 }}>Cycle averages</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, width: "100%" }}>
                <div className="stat"><div className="stat-val">{profile.cycleLen}</div><div className="stat-label">Cycle</div></div>
                <div className="stat"><div className="stat-val">{profile.periodLen}</div><div className="stat-label">Period</div></div>
                <div className="stat"><div className="stat-val">14</div><div className="stat-label">Tracked</div></div>
              </div>
            </div>
          </div>
        </div>
      </>
    );
  }

  /* ═══════════════════════ INSIGHTS (RECOMMENDATIONS) ═══════════════════════ */
  const FEELINGS = ["Tired", "Energetic", "Bloated", "Calm", "Low", "Crampy", "Anxious", "Bright"];

  function InsightsScreen({ profile, day, onNav }) {
    const phase = phaseForDay(day);
    const [tips, setTips] = useState(TIPS_BY_PHASE[phase.id]);
    const [filter, setFilter] = useState("all");

      const feeling = feelings.join(" ").toLowerCase();
      api.fetchRecommendations({ day, phase: phase.id, profile, feeling }).then(setTips);

    const visible = filter === "all" ? tips : tips.filter(t => t.kind === filter);

    return (
      <>
        <div className="screen-hd">
          <div>
            <div className="eyebrow">For your {phase.name.toLowerCase()} phase · day {day}</div>
            <h1 className="screen-title display">Today's <em>recommendations</em></h1>
          </div>
        </div>

        <p className="lede">{phase.blurb} Recommendations are tuned to what your body needs right now — across nourishment, movement, mind, and care.</p>

        <div style={{ marginTop: 24 }}>
          <div className="eyebrow" style={{ marginBottom: 10 }}>How are you feeling today?</div>
          <div className="filter-row" style={{ marginBottom: 24 }}>
            {FEELINGS.map(f => (
              <button key={f} className={`filter-chip ${feelings.includes(f) ? "on" : ""}`}

            ))}

  /* ═══════════════════════ CHAT (Vera) ═══════════════════════ */
  const QUICK_PROMPTS = [
    "Why am I so tired today?",
    "What should I eat?",
    "Is this cramping normal?",
    "I feel low — what helps?",
    "Should I work out today?",
  ];

  function ChatScreen({ profile, day }) {
    const [messages, setMessages] = useState([
      { who: "bot", text: "Hi — I'm Vera. I can help you make sense of what you're feeling, suggest small things to try, or just listen. What's on your mind today?" },
    ]);
    const [input, setInput] = useState("");
    const [typing, setTyping] = useState(false);
    const scrollRef = useRef(null);
    const phase = phaseForDay(day);

    useEffect(() => {
      if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }, [messages, typing]);

    async function send(text) {
      if (!text.trim() || typing) return;
      const userMsg = { who: "me", text };
      const history = [...messages, userMsg];
      setMessages(history);
      setInput("");
      setTyping(true);

      // AI: call Python LLM endpoint for Vera's reply
      const reply = await api.veraReply(text, {
        day, phase: phase.name.toLowerCase(), profile, history,
      });
      setMessages(m => [...m, { who: "bot", text: reply }]);
      setTyping(false);
    }

    return (
      <div className="chat-wrap">
        <div className="chat-header">
          <div className="chat-avatar">V</div>
          <div>
            <h1>Vera</h1>
            <div className="chat-status"><span className="chat-dot" /> Online · cycle companion</div>
          </div>
        </div>

        <div className="chat-thread" ref={scrollRef}>
          {messages.map((m, i) => (
            <div key={i} className={`bubble bubble-${m.who}`}>
              {m.who === "bot" && <div className="bubble-avatar">V</div>}
              <div className="bubble-text">{m.text}</div>
            </div>
          ))}
          {typing && (
            <div className="bubble bubble-bot">
              <div className="bubble-avatar">V</div>
              <div className="bubble-text typing"><span/><span/><span/></div>
            </div>
          )}
        </div>

        <div className="chat-prompts">
          {QUICK_PROMPTS.map(q => (
            <button key={q} className="chip" onClick={() => send(q)}>{q}</button>
          ))}
        </div>

        <form className="chat-input" onSubmit={e => { e.preventDefault(); send(input); }}>
          <input value={input} onChange={e => setInput(e.target.value)} placeholder="Tell Vera how you're feeling…" />
          <button type="submit" className="icon-btn-solid" aria-label="Send"><Icon name="send" size={16} /></button>
        </form>
      </div>
    );
  }

  /* ═══════════════════════ ALERTS ═══════════════════════ */
  function AlertsScreen({ profile, day }) {
    const [items, setItems] = useState([]);
    const [loading, setLoading] = useState(true);

    const TITLES = {
      missed_log: "Reminder to log your period",
      late_period: "Your cycle ran a little long",
      irregularity: "Cycle variation noticed",
      abnormal_pain: "Pain level higher than usual",
    };
    const LEVEL_META = {
      info:           { dot: "🟢", label: "Info",            color: "var(--sage)" },
      attention:      { dot: "🟡", label: "Attention",       color: "var(--ochre)" },
      recommandation: { dot: "🔴", label: "Talk to a doctor", color: "var(--primary)" },
    };
    const KIND_ICON = { missed_log: "calendar", late_period: "drop", irregularity: "moon", abnormal_pain: "sparkle" };

    const load = () => {
      setLoading(true);
      fetch(`${API_BASE}/api/alerting/alerts`, { credentials: "include" })
        .then(r => r.json())
        .then(data => setItems(Array.isArray(data) ? data : []))
        .catch(() => setItems([]))
        .finally(() => setLoading(false));
    };

    useEffect(() => { load(); }, [day]);

    const sendFeedback = async (id, feedback) => {
      setItems(items.map(a => a.id === id ? { ...a, feedback } : a));
      try {
        await fetch(`${API_BASE}/api/alerting/alerts/${id}/feedback`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ feedback }),
        });
      } catch {}
    };

    const timeAgo = (isoDate) => {
      const diffMs = Date.now() - new Date(isoDate).getTime();
      const days = Math.floor(diffMs / 86400000);
      if (days <= 0) return "today";
      if (days === 1) return "yesterday";
      return `${days} days ago`;
    };

    return (
      <>
        <div className="screen-hd">
          <div>
            <div className="eyebrow">Quiet, considered</div>
            <h1 className="screen-title display">Alerts</h1>
          </div>
        </div>

        <p className="lede" style={{ marginBottom: 24 }}>
          These flag statistical patterns in what you've logged — not a diagnosis.
          If something feels off, it's always worth a conversation with a professional.
        </p>

        <div className="alerts-wrap">
          {items.map(a => {
            const meta = LEVEL_META[a.level] || LEVEL_META.info;
            return (
              <article key={a.id} className="alert-row">
                <div className="alert-icon" style={{ background: `color-mix(in oklab, ${meta.color} 18%, transparent)`, color: meta.color }}>
                  <Icon name={KIND_ICON[a.type] || "info"} size={16} />
                </div>
                <div className="alert-body">
                  <div className="alert-meta">
                    <span>{meta.dot} {meta.label}</span>
                    <span>· {timeAgo(a.sentAt)}</span>
                  </div>
                  <h3 className="alert-title">{TITLES[a.type] || "Alert"}</h3>
                  <p className="alert-text">{a.message}</p>
                  <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                    <button
                      className="chip"
                      style={a.feedback === "utile" ? { background: "var(--ink)", color: "var(--cream)", borderColor: "var(--ink)" } : {}}
                      onClick={() => sendFeedback(a.id, "utile")}>
                      Helpful
                    </button>
                    <button
                      className="chip"
                      style={a.feedback === "pas_pertinent" ? { background: "var(--ink)", color: "var(--cream)", borderColor: "var(--ink)" } : {}}
                      onClick={() => sendFeedback(a.id, "pas_pertinent")}>
                      Not relevant
                    </button>
                  </div>
                </div>
              </article>
            );
          })}

          {!loading && items.length === 0 && (
            <div className="info-card" style={{ textAlign: "center", padding: 48 }}>
              <Icon name="check" size={24} /><p style={{ marginTop: 12, color: "var(--mute)" }}>All clear. We'll let you know.</p>
            </div>
          )}

        </div>
      </>
    );
  }

  /* ═══════════════════════ LOG SYMPTOMS ═══════════════════════ */
  function LogSymptomsScreen({ profile, day }) {
    const phase = phaseForDay(day);
    const [suggestions, setSuggestions] = useState([]);
    const [selected, setSelected] = useState([]);
    const [painScore, setPainScore] = useState(3);
    const [saving, setSaving] = useState(false);
    const [saved, setSaved] = useState(false);
    const [error, setError] = useState("");

    useEffect(() => {
      setSaved(false);
      fetch(`${API_BASE}/api/alerting/suggestions?phase=${phase.id}`, { credentials: "include" })
        .then(r => r.json())
        .then(data => setSuggestions(Array.isArray(data) ? data : []))
        .catch(() => setSuggestions([]));
    }, [phase.id]);

    const toggle = (symptom) => setSelected(prev =>
      prev.includes(symptom) ? prev.filter(s => s !== symptom) : [...prev, symptom]
    );

    const save = async () => {
      setSaving(true); setError("");
      try {
        const res = await fetch(`${API_BASE}/api/alerting/symptom`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            date: new Date().toISOString().slice(0, 10),
            phase: phase.id,
            painScore,
            symptoms: selected,
          }),
        });
        if (!res.ok) throw new Error();
        setSaved(true);
        setSelected([]);
      } catch {
        setError("Couldn't save right now. Check the backend is running.");
      }
      setSaving(false);
    };

    return (
      <>
        <div className="screen-hd">
          <div>
            <div className="eyebrow">{phase.name} phase · day {day}</div>
            <h1 className="screen-title display">Log how you <em>feel</em>.</h1>

            <div className="eyebrow" style={{ marginBottom: 12 }}>Suggested for your phase</div>

              {suggestions.map(s => (
                <button key={s.symptom} className={`chip ${selected.includes(s.symptom) ? "on" : ""}`}
                  onClick={() => toggle(s.symptom)}>
                  {s.symptom}
                </button>
              ))}
            </div>
          </>)}

          {Object.entries(SYMPTOM_CATALOG).map(([category, { icon, items }]) => (
            <div key={category} style={{ marginBottom: 22 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <div className="tip-icon" style={{ width: 26, height: 26, marginBottom: 0 }}>
                  <Icon name={icon} size={14} />
                </div>
                <span className="eyebrow" style={{ padding: 0 }}>{category}</span>
              </div>
              <div className="chip-grid">
                {items.map(symptom => (
                  <button key={symptom} className={`chip ${selected.includes(symptom) ? "on" : ""}`}
                    onClick={() => toggle(symptom)}>
                    {symptom}
                  </button>
                ))}
              </div>
            </div>
          ))}

          <div className="eyebrow" style={{ marginTop: 10, marginBottom: 10 }}>Pain level</div>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <input type="range" min="0" max="10" value={painScore}
              onChange={e => setPainScore(Number(e.target.value))} style={{ flex: 1 }} />
            <span className="display" style={{ fontSize: 24, width: 32, textAlign: "center" }}>{painScore}</span>
          </div>

          {error && <p style={{ color: "var(--primary)", fontSize: 13, marginTop: 14 }}>{error}</p>}
          {saved && <p style={{ color: "var(--sage)", fontSize: 13, marginTop: 14 }}>Saved — thank you.</p>}

            disabled={saving} onClick={save}>
            {saving ? "Saving…" : <>Save entry <Icon name="check" size={16} /></>}
          </button>
        </div>
      </>
    );
  }

  /* ═══════════════════════ ROOT APP ═══════════════════════ */
  function App() {
    const [route, setRoute]   = useState("onboarding");
    const [profile, setProfile] = useState(null);

    // On mount: check if already logged in and restore profile
    useEffect(() => {
      fetch(`${API_BASE}/api/auth/me`, { credentials: "include" })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (data && data.lastPeriod) {
            setProfile({ name: data.name, lastPeriod: data.lastPeriod, cycleLen: data.cycleLen, periodLen: data.periodLen });
            setRoute("home");
          }
        }).catch(() => {});
    }, []);

    const day = profile ? cycleDayFromDates(new Date(profile.lastPeriod), new Date(), profile.cycleLen) : 14;

    const finishOnboarding = (p) => {
      fetch(`${API_BASE}/api/profile`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(p),
      });
      if (p.phoneNumber) {
        fetch(`${API_BASE}/api/alerting/profile`, {
          method: "POST", credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phoneNumber: p.phoneNumber, whatsappConsent: true }),
        });
      }
      setProfile(p);
      setRoute("home");
    };

    const reset = () => { setProfile(null); setRoute("onboarding"); };
    const updateProfile = (p) => {
      fetch(`${API_BASE}/api/profile`, {
        method: "POST", credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(p),
      });
      setProfile(p);
    };

    if (route === "onboarding" || !profile) {
      return (
        <div className="app onboarding-mode">
          <Onboarding onDone={finishOnboarding} />
        </div>
      );
    }

    return (
      <div className="app">
        <Sidebar route={route} setRoute={setRoute} profile={profile} day={day} alertCount={2} />
        <div className="main">
          <Topbar route={route} day={day} />
          <div className="content">
            {route === "home"     && <HomeScreen     profile={profile} day={day} onNav={setRoute} />}
            {route === "calendar" && <CalendarScreen profile={profile} day={day} />}
            {route === "insights" && <InsightsScreen profile={profile} day={day} onNav={setRoute} />}
            {route === "log"      && <LogSymptomsScreen profile={profile} day={day} />}
            {route === "chat"     && <ChatScreen     profile={profile} day={day} />}
            {route === "alerts"   && <AlertsScreen   profile={profile} day={day} />}
            {route === "profile"  && <ProfileScreen  profile={profile} day={day} onReset={reset} onUpdateProfile={updateProfile} />}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
