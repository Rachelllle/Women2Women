<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Women2Women — Cycle companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (compiled in the browser, no build step) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <!-- App source, split by concern. Order matters: each file may use the ones above it. -->
  <script type="text/babel" data-presets="react" src="/static/js/lib.js"></script>
  <script type="text/babel" data-presets="react" src="/static/js/ui.js"></script>
  <script type="text/babel" data-presets="react" src="/static/js/onboarding.js"></script>
  <script type="text/babel" data-presets="react" src="/static/js/screens.js"></script>
  <script type="text/babel" data-presets="react" src="/static/js/app.js"></script>
</body>
</html>
